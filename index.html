<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Inteligente PRO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI';
  text-align: center;
  background: linear-gradient(to top, #1c1c1c, #4facfe);
  color: white;
}

/* Panel */
.panel {
  position: absolute;
  top: 10px;
  width: 100%;
}

/* Calle */
.calle {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 130px;
  background: #111;
}

.linea {
  position: absolute;
  bottom: 65px;
  width: 100%;
  height: 6px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 30px,
    transparent 30px,
    transparent 60px
  );
}

/* 🚗 AUTO MODERNO */
.auto {
  position: absolute;
  bottom: 130px;
  left: 0;
  transition: left 0.3s linear;
}

/* carro */
.carro {
  width: 140px;
  height: 45px;
  background: linear-gradient(45deg, #ff0000, #990000);
  border-radius: 15px;
  position: relative;
  box-shadow: 0 0 15px rgba(255,0,0,0.5);
}

.techo {
  width: 70px;
  height: 25px;
  background: #222;
  position: absolute;
  top: -20px;
  left: 35px;
  border-radius: 10px;
}

.ventana {
  width: 50px;
  height: 15px;
  background: #90caf9;
  margin: 5px auto;
  border-radius: 5px;
}

/* ruedas */
.rueda {
  width: 28px;
  height: 28px;
  background: black;
  border-radius: 50%;
  position: absolute;
  bottom: -15px;
}

.r1 { left: 20px; }
.r2 { right: 20px; }

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.girando {
  animation: girar 0.2s linear infinite;
}

/* humo */
.humo {
  position: absolute;
  left: -25px;
  bottom: 10px;
  width: 15px;
  height: 15px;
  background: gray;
  border-radius: 50%;
  opacity: 0;
}

@keyframes humoAnim {
  0% { transform: scale(1); opacity: 0.5; }
  100% { transform: translateY(-50px) scale(2); opacity: 0; }
}

.humo.activo {
  animation: humoAnim 1s infinite;
}

/* texto */
#estado {
  font-size: 26px;
}

#distancia {
  font-size: 22px;
}

#velocidad {
  font-size: 20px;
  color: #00ffcc;
}

</style>
</head>

<body>

<div class="panel">
  <h1>🏎️ AUTO INTELIGENTE PRO</h1>
  <div id="distancia">---</div>
  <div id="velocidad"></div>
  <div id="estado"></div>
</div>

<div class="auto" id="auto">

  <div class="carro">
    <div class="techo">
      <div class="ventana"></div>
    </div>
  </div>

  <div class="rueda r1" id="r1"></div>
  <div class="rueda r2" id="r2"></div>

  <div class="humo" id="humo"></div>

</div>

<div class="calle"></div>
<div class="linea"></div>

<script>

const token = "0f162a4b-5d6b-4adf-943b-8d949f9b5219";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distancia").innerHTML =
      "📏 Distancia: " + d + " cm";

    let auto = document.getElementById("auto");
    let estado = document.getElementById("estado");
    let humo = document.getElementById("humo");
    let r1 = document.getElementById("r1");
    let r2 = document.getElementById("r2");

    let max = window.innerWidth - 160;
    let pos = (d / 100) * max;

    if (pos < 0) pos = 0;
    if (pos > max) pos = max;

    auto.style.left = pos + "px";

    // velocidad simulada
    let velocidad = Math.floor(d * 2);
    document.getElementById("velocidad").innerHTML =
      "⚡ Velocidad: " + velocidad + " km/h";

    if (d < 15) {
      estado.innerHTML = "🚨 FRENANDO";
      humo.classList.remove("activo");
      r1.classList.remove("girando");
      r2.classList.remove("girando");
    } 
    else if (d < 30) {
      estado.innerHTML = "⚠️ CUIDADO";
      humo.classList.add("activo");
      r1.classList.add("girando");
      r2.classList.add("girando");
    } 
    else {
      estado.innerHTML = "🟢 VELOCIDAD MÁXIMA";
      humo.classList.add("activo");
      r1.classList.add("girando");
      r2.classList.add("girando");
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
